# Netlify publishing for Fairy Fox Games.
#
# The games are 100% static (HTML + canvas + ES modules) — no build step, exactly
# like the GitHub Pages deploy. The whole repo root is the site, served verbatim.
# Deploys run from GitHub Actions (.github/workflows/netlify.yml) via the Netlify
# CLI using a token, so deploy logic stays in-repo (no Netlify Git build needed).
#
# This is a SECOND home for the site, in addition to GitHub Pages at
# fairyfox.io/fairyfox-games/. Netlify serves it at games.fairyfox.io (custom
# domain set in the Netlify UI; DNS is a CNAME for games.fairyfox.io → Netlify,
# the same pattern the sibling prompt.fairyfox.io already uses).

[build]
  publish = "."
  command = ""

# Static files only — don't let Netlify post-process/transform anything.
[build.processing]
  skip_processing = true

# A couple of polite security headers; harmless for static games.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
