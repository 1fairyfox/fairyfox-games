<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
{% include head.html %}
</head>
<body>
{% include header.html %}
{{ content }}
{% include footer.html %}

<!-- Chrome behaviour + reader menu (shared, browser-imported), then any page module. -->
<script src="{{ '/assets/nav.js' | relative_url }}" defer></script>
<script src="{{ '/assets/reader.js' | relative_url }}" defer></script>
{% if page.script %}<script type="module" src="{{ '/assets/' | append: page.script | append: '.js' | relative_url }}"></script>
{% endif %}</body>
</html>
